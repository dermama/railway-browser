server {
    listen ${PORT};

    client_max_body_size 100M;

    # توجيه طلبات الـ API إلى سيرفر Node.js على البورت 7000
    location /api/ {
        proxy_pass http://127.0.0.1:7000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # واجهة المراقبة
    location /monitor {
        proxy_pass http://127.0.0.1:7000;
        proxy_set_header Host $host;
    }

    # توجيه الـ WebSocket الخاص بالإضافة إلى السيرفر
    location /ws {
        proxy_pass http://127.0.0.1:7000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # توجيه NoVNC (شاشة المتصفح)
    # سنقوم بتشغيل websockify على البورت 6080 داخلياً
    location /websockify {
        proxy_pass http://127.0.0.1:6080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # الواجهة الرئيسية: تعرض شاشة المتصفح VNC
    location / {
        proxy_pass http://127.0.0.1:6080/;
        proxy_set_header Host $host;
    }
}
